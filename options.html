<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLeaf Extension Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      min-width: 420px;
      padding: 24px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .header-dot {
      width: 10px; height: 10px;
      background: #059669;
      border-radius: 50%;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #059669;
    }
    .header p {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 4px;
    }
    .field-hint {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 3px;
    }

    .field-input {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: #059669; }
    .field-input.has-error { border-color: #ef4444; }

    .info-box {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      color: #374151;
      margin-bottom: 20px;
    }
    .info-box strong { color: #059669; }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 16px 0;
    }

    .save-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }

    #saveBtn {
      padding: 9px 20px;
      background: #059669;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #saveBtn:hover { background: #047857; }
    #saveBtn:disabled { background: #9ca3af; cursor: not-allowed; }

    .save-feedback { font-size: 13px; }
    .save-feedback.ok  { color: #059669; }
    .save-feedback.err { color: #ef4444; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="header-dot"></div>
        <h1>GreenLeaf Settings</h1>
      </div>
      <p>Update your extension token here</p>
    </div>
  </div>

  <div class="info-box">
    Generate your token from the <strong>GreenLeaf dashboard → Settings → Extension Token</strong> and paste it below.
  </div>

  <div class="section-label">GreenLeaf Connection</div>

  <div class="field">
    <label for="authToken">Extension Token</label>
    <input id="authToken" class="field-input" type="password"
           placeholder="Paste your extension token here" autocomplete="off">
    <div class="field-hint">
      GreenLeaf dashboard → Settings → Extension Token
    </div>
  </div>

  <div class="divider"></div>

  <div class="save-row">
    <button id="saveBtn">Save Settings</button>
    <span id="saveFeedback" class="save-feedback"></span>
  </div>

  <script src="options.js" type="module"></script>
</body>
</html>

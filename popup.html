<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:      #059669;
      --brand-dark: #047857;
      --brand-light:#d1fae5;
      --amber:      #d97706;
      --amber-light:#fef3c7;
      --red:        #dc2626;
      --red-light:  #fee2e2;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-600:   #4b5563;
      --gray-800:   #1f2937;
      --radius:     8px;
      --shadow:     0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 360px;
      min-height: 200px;
      background: var(--gray-50);
      color: var(--gray-800);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      background: white;
      border-bottom: 1px solid var(--gray-200);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 700;
      font-size: 15px;
      color: var(--brand);
    }
    .logo svg { flex-shrink: 0; }
    .mode-pill {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--brand-light);
      color: var(--brand-dark);
    }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-400);
      padding: 2px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color .15s;
    }
    .icon-btn:hover { color: var(--gray-800); }

    /* ── Cards ───────────────────────────────────────── */
    .cards { padding: 10px 10px 12px; display: flex; flex-direction: column; gap: 8px; }

    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px 8px;
      border-bottom: 1px solid var(--gray-100);
    }
    .card-title {
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--gray-600);
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
      background: var(--amber-light);
      color: var(--amber);
      min-width: 18px;
      text-align: center;
    }
    .badge.green {
      background: var(--brand-light);
      color: var(--brand-dark);
    }
    .card-body { padding: 10px 12px; }

    /* ── Current Certificate ─────────────────────────── */
    .cert-vehicle {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: .04em;
      color: var(--gray-800);
      margin-bottom: 10px;
      word-break: break-all;
    }
    .cert-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }
    .meta-cell {
      background: var(--gray-50);
      border-radius: 6px;
      padding: 6px 8px;
      text-align: center;
    }
    .meta-cell.expiring {
      background: var(--amber-light);
    }
    .meta-label {
      font-size: 10px;
      color: var(--gray-400);
      font-weight: 500;
      margin-bottom: 1px;
    }
    .meta-value {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-800);
    }
    .meta-cell.expiring .meta-value { color: var(--amber); }

    /* ── Mobile row ──────────────────────────────────── */
    .mobile-row {
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }
    .mobile-wrap { flex: 1; }
    .field-input {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid var(--gray-200);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: var(--gray-800);
      background: white;
      transition: border-color .15s;
    }
    .field-input:focus {
      outline: none;
      border-color: var(--brand);
    }
    .field-input.has-error { border-color: var(--red); }
    .field-error {
      font-size: 11px;
      color: var(--red);
      margin-top: 3px;
      min-height: 14px;
    }
    .btn-save {
      padding: 7px 14px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-save:hover { background: var(--brand-dark); }
    .btn-save:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

    .btn-pending {
      padding: 7px 10px;
      background: white;
      color: var(--amber);
      border: 1.5px solid var(--amber);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s;
    }
    .btn-pending:hover { background: var(--amber-light); }
    .btn-pending:disabled { opacity: .5; cursor: not-allowed; }

    .save-feedback {
      margin-top: 6px;
      font-size: 12px;
      min-height: 16px;
    }
    .save-feedback.ok  { color: var(--brand); }
    .save-feedback.err { color: var(--red); }

    /* ── Pending list ────────────────────────────────── */
    .pending-list { display: flex; flex-direction: column; gap: 8px; }
    .pending-item {
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      padding: 8px 10px;
      background: white;
    }
    .pending-item-vehicle {
      font-size: 13px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 3px;
    }
    .pending-item-dates {
      font-size: 11px;
      color: var(--gray-400);
      margin-bottom: 7px;
    }
    .pending-row {
      display: flex;
      gap: 5px;
      align-items: flex-start;
    }
    .btn-complete {
      padding: 6px 10px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background .15s;
    }
    .btn-complete:hover { background: var(--brand-dark); }
    .btn-complete:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
    .pending-item-feedback {
      font-size: 11px;
      margin-top: 4px;
      min-height: 14px;
    }
    .pending-item-feedback.ok  { color: var(--brand); }
    .pending-item-feedback.err { color: var(--red); }

    /* ── Last Saved ──────────────────────────────────── */
    .saved-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .saved-vehicle {
      font-weight: 700;
      color: var(--gray-800);
    }
    .saved-meta {
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 1px;
    }

    /* ── Empty / No-data ─────────────────────────────── */
    .empty {
      text-align: center;
      color: var(--gray-400);
      padding: 14px 8px;
      font-size: 12px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a9 9 0 0 1 9 9c0 6-9 13-9 13S3 17 3 11a9 9 0 0 1 9-9z"/>
        <circle cx="12" cy="11" r="3"/>
      </svg>
      GreenLine
    </div>
    <div class="header-right">
      <span id="modePill" class="mode-pill">BACKEND</span>
      <button class="icon-btn" id="settingsBtn" title="Settings" onclick="chrome.runtime.openOptionsPage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="cards">

    <!-- Current Certificate -->
    <div class="card" id="cardCurrent">
      <div class="card-header">
        <span class="card-title">Current Certificate</span>
      </div>
      <div class="card-body" id="currentBody">
        <div class="empty">Open a PUC certificate page to scan data.</div>
      </div>
    </div>

    <!-- Pending Records -->
    <div class="card" id="cardPending">
      <div class="card-header">
        <span class="card-title">Pending — add mobile</span>
        <span class="badge" id="pendingBadge">0</span>
      </div>
      <div class="card-body">
        <div id="pendingList" class="pending-list">
          <div class="empty">No pending records.</div>
        </div>
      </div>
    </div>

    <!-- Last Saved -->
    <div class="card" id="cardSaved">
      <div class="card-header">
        <span class="card-title">Last Saved</span>
        <span class="badge green" id="savedCheck" style="display:none">&#10003;</span>
      </div>
      <div class="card-body">
        <div id="savedBody">
          <div class="empty">Nothing saved yet.</div>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>

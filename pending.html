<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLeaf — Pending Records</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #059669;
      --brand-dark:  #047857;
      --brand-light: #d1fae5;
      --amber:       #d97706;
      --amber-light: #fef3c7;
      --red:         #dc2626;
      --red-light:   #fee2e2;
      --gray-50:     #f9fafb;
      --gray-100:    #f3f4f6;
      --gray-200:    #e5e7eb;
      --gray-400:    #9ca3af;
      --gray-500:    #6b7280;
      --gray-600:    #4b5563;
      --gray-800:    #1f2937;
      --gray-900:    #111827;
      --radius:      8px;
      --shadow:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 17px;
      color: var(--brand);
    }
    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-600);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      padding: 1px 7px;
      border-radius: 999px;
      background: var(--amber-light);
      color: var(--amber);
      font-size: 12px;
      font-weight: 700;
      margin-left: 8px;
    }

    /* ── Main content ────────────────────────────────────── */
    .main {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    /* ── Record cards ────────────────────────────────────── */
    .records-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .record-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 16px;
    }
    .record-card.saving { opacity: .6; pointer-events: none; }

    .record-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .record-vehicle {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .03em;
      color: var(--gray-800);
    }
    .record-date {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 2px;
    }
    .expiry-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .expiry-badge.ok      { background: var(--brand-light); color: var(--brand-dark); }
    .expiry-badge.warning { background: var(--amber-light); color: var(--amber); }

    .record-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--gray-500);
    }
    .meta-item strong { color: var(--gray-800); font-weight: 600; }

    .record-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .record-input-wrap { flex: 1; }
    .field-input {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid var(--gray-200);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: var(--gray-800);
      background: white;
      transition: border-color .15s;
    }
    .field-input:focus { outline: none; border-color: var(--brand); }
    .field-input.has-error { border-color: var(--red); }
    .field-error {
      font-size: 11px;
      color: var(--red);
      margin-top: 3px;
      min-height: 14px;
    }

    .btn-save {
      padding: 8px 18px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
      flex-shrink: 0;
    }
    .btn-save:hover { background: var(--brand-dark); }
    .btn-save:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

    .btn-discard {
      padding: 8px 12px;
      background: white;
      color: var(--red);
      border: 1.5px solid var(--red);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s;
    }
    .btn-discard:hover { background: var(--red-light); }
    .btn-discard:disabled { opacity: .5; cursor: not-allowed; }

    .record-feedback {
      margin-top: 6px;
      font-size: 12px;
      min-height: 16px;
    }
    .record-feedback.ok  { color: var(--brand); }
    .record-feedback.err { color: var(--red); }

    /* ── Empty state ─────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
    }
    .empty-icon {
      width: 56px;
      height: 56px;
      background: var(--brand-light);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: var(--brand);
    }
    .empty-state h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 6px;
    }
    .empty-state p {
      font-size: 13px;
      color: var(--gray-500);
    }

    /* ── Loading ─────────────────────────────────────────── */
    .loading-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--gray-400);
      font-size: 13px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a9 9 0 0 1 9 9c0 6-9 13-9 13S3 17 3 11a9 9 0 0 1 9-9z"/>
        <circle cx="12" cy="11" r="3"/>
      </svg>
      GreenLeaf
    </div>
    <div class="header-title">
      Pending Records <span class="badge" id="countBadge">…</span>
    </div>
  </header>

  <main class="main">
    <div id="content">
      <div class="loading-state">
        <div class="spinner"></div>
        Loading pending records…
      </div>
    </div>
  </main>

  <script type="module" src="pending.js"></script>
</body>
</html>
